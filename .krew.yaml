apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: node-pods
spec:
  version: {{ .TagName }}
  homepage: https://github.com/noahnut/kubectl-node-pods
  shortDescription: "Show node pod and resource balance"
  description: |
    A kubectl plugin that displays pod counts and CPU/Memory
    request pressure across nodes to identify scheduling imbalance.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    {{addURIAndSha "https://github.com/noahnut/kubectl-node-pods/releases/download/{{ .TagName }}/kubectl-node_pods-linux-amd64.tar.gz" .TagName }}
    bin: kubectl-node_pods
    files:
      - from: LICENSE
        to: .
      - from: kubectl-node_pods
        to: .
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    {{addURIAndSha "https://github.com/noahnut/kubectl-node-pods/releases/download/{{ .TagName }}/kubectl-node_pods-linux-arm64.tar.gz" .TagName }}
    bin: kubectl-node_pods
    files:
      - from: LICENSE
        to: .
      - from: kubectl-node_pods
        to: .
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    {{addURIAndSha "https://github.com/noahnut/kubectl-node-pods/releases/download/{{ .TagName }}/kubectl-node_pods-darwin-amd64.tar.gz" .TagName }}
    bin: kubectl-node_pods
    files:
      - from: LICENSE
        to: .
      - from: kubectl-node_pods
        to: .
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    {{addURIAndSha "https://github.com/noahnut/kubectl-node-pods/releases/download/{{ .TagName }}/kubectl-node_pods-darwin-arm64.tar.gz" .TagName }}
    bin: kubectl-node_pods
    files:
      - from: LICENSE
        to: .
      - from: kubectl-node_pods
        to: .

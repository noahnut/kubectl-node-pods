name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  BINARY_NAME: kubectl-node_pods
  PLUGIN_NAME: node-pods
  REPO: noahfan/kubectl-node-pods

jobs:
  build-release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: darwin
            arch: amd64
            ext: ""
          - os: darwin
            arch: arm64
            ext: ""
          - os: linux
            arch: amd64
            ext: ""
          - os: linux
            arch: arm64
            ext: ""
          - os: windows
            arch: amd64
            ext: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build archive
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} go build -ldflags="-s -w" -o "dist/${BINARY_NAME}${{ matrix.ext }}" .
          tar -czf "dist/${BINARY_NAME}-${{ matrix.os }}-${{ matrix.arch }}.tar.gz" -C dist "${BINARY_NAME}${{ matrix.ext }}"
          rm -f "dist/${BINARY_NAME}${{ matrix.ext }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/*.tar.gz

  publish:
    runs-on: ubuntu-latest
    needs: build-release
    outputs:
      version: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all dist artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-all
          merge-multiple: true

      - name: Prepare checksums
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          mkdir -p dist
          cp dist-all/*.tar.gz dist/
          (cd dist && sha256sum *.tar.gz > checksums.txt)
          cat dist/checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dist/*.tar.gz
            dist/checksums.txt

      - name: Upload checksum artifact
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: dist/checksums.txt

  generate-krew-manifest:
    runs-on: ubuntu-latest
    needs: publish

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download checksums
        uses: actions/download-artifact@v4
        with:
          name: checksums
          path: dist

      - name: Generate krew manifest
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ needs.publish.outputs.version }}"
          REPO_NAME="${REPO}"
          BINARY="${BINARY_NAME}"

          sha_for() {
            local file="$1"
            awk -v f="$file" '$2==f {print $1}' dist/checksums.txt
          }

          DARWIN_AMD64_FILE="${BINARY}-darwin-amd64.tar.gz"
          DARWIN_ARM64_FILE="${BINARY}-darwin-arm64.tar.gz"
          LINUX_AMD64_FILE="${BINARY}-linux-amd64.tar.gz"
          LINUX_ARM64_FILE="${BINARY}-linux-arm64.tar.gz"
          WINDOWS_AMD64_FILE="${BINARY}-windows-amd64.tar.gz"

          DARWIN_AMD64_SHA="$(sha_for "$DARWIN_AMD64_FILE")"
          DARWIN_ARM64_SHA="$(sha_for "$DARWIN_ARM64_FILE")"
          LINUX_AMD64_SHA="$(sha_for "$LINUX_AMD64_FILE")"
          LINUX_ARM64_SHA="$(sha_for "$LINUX_ARM64_FILE")"
          WINDOWS_AMD64_SHA="$(sha_for "$WINDOWS_AMD64_FILE")"

          PLATFORMS_JSON="$(cat <<EOF
          [
            {"os":"darwin","arch":"amd64","bin":"${BINARY}","uri":"https://github.com/${REPO_NAME}/releases/download/${VERSION}/${DARWIN_AMD64_FILE}","sha256":"${DARWIN_AMD64_SHA}"},
            {"os":"darwin","arch":"arm64","bin":"${BINARY}","uri":"https://github.com/${REPO_NAME}/releases/download/${VERSION}/${DARWIN_ARM64_FILE}","sha256":"${DARWIN_ARM64_SHA}"},
            {"os":"linux","arch":"amd64","bin":"${BINARY}","uri":"https://github.com/${REPO_NAME}/releases/download/${VERSION}/${LINUX_AMD64_FILE}","sha256":"${LINUX_AMD64_SHA}"},
            {"os":"linux","arch":"arm64","bin":"${BINARY}","uri":"https://github.com/${REPO_NAME}/releases/download/${VERSION}/${LINUX_ARM64_FILE}","sha256":"${LINUX_ARM64_SHA}"},
            {"os":"windows","arch":"amd64","bin":"${BINARY}.exe","uri":"https://github.com/${REPO_NAME}/releases/download/${VERSION}/${WINDOWS_AMD64_FILE}","sha256":"${WINDOWS_AMD64_SHA}"}
          ]
          EOF
          )"

          go run ./cmd/gen-manifest \
            --template templates/krew-plugin.yaml.tmpl \
            --output krew-plugin.yaml \
            --plugin-name "${PLUGIN_NAME}" \
            --version "${VERSION}" \
            --repo "${REPO_NAME}" \
            --platforms-json "${PLATFORMS_JSON}"

          echo "Generated manifest:"
          cat krew-plugin.yaml

      - name: Upload krew manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: krew-manifest
          path: krew-plugin.yaml